name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # Bloque 1: Pruebas Unitarias
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Prueba Unitaria
        run: |
          python test_app.py

  # Bloque 2: Empaquetado y subida a Docker Hub
  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hola-mundo-devops:latest

  # Bloque 3: Despliegue en Producción
  deploy:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en Render
        run: |
          echo "Notificando a Render para el despliegue..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}